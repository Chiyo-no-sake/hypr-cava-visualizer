# Hyprland integration for hypr-cava-visualizer
#
# Add these rules to your ~/.config/hypr/hyprland.conf

# Layer rules
layerrule = noanim, hypr-cava-visualizer
layerrule = blur, hypr-cava-visualizer
layerrule = blurpasses, 0, hypr-cava-visualizer

# Autostart (wrapper handles LD_PRELOAD automatically)
exec-once = hypr-cava-visualizer

# With custom colors:
# exec-once = hypr-cava-visualizer --color-primary "#FF6B6B" --color-secondary "#4ECDC4" --color-tertiary "#45B7D1" --opacity 0.4

# With a colors file (e.g. generated by matugen):
# exec-once = hypr-cava-visualizer --colors-file ~/.config/hypr/colors.conf
